name: pelada-mysql

networks:
  pelada_internal:
    external: true
    name: pelada_internal
  production:
    external: true
    name: production

services:
  mysql:
    image: mysql:8.0
    container_name: pelada-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - LANG=C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - pelada_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pelada_internal

volumes:
  pelada_data:
    driver: local
    name: pelada_data