name: "Build & Push Frontend"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag existente no repositorio (ex: v1.2.0)"
        required: true
        type: string

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # JOB 1 - Validar tag
  # ════════════════════════════════════════════════════════════════════════
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar se a tag existe
        run: |
          if ! git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag '${{ inputs.tag }}' nao existe no repositorio."
            exit 1
          fi
          echo "Tag '${{ inputs.tag }}' encontrada."

  # ════════════════════════════════════════════════════════════════════════
  # JOB 2 - Build e Push para Docker Hub
  # ════════════════════════════════════════════════════════════════════════
  build-push:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout do repositorio na tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pelada-app:${{ inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pelada-app:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pelada-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pelada-app:buildcache,mode=max

      - name: Resumo
        run: |
          echo "======================================================"
          echo "  Imagem publicada no Docker Hub"
          echo "======================================================"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/pelada-app:${{ inputs.tag }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/pelada-app:latest"
          echo "======================================================"

# ═══════════════════════════════════════════════════════════════════════════
# SECRETS NECESSARIAS (Settings > Secrets > Actions)
# ═══════════════════════════════════════════════════════════════════════════
# DOCKERHUB_USERNAME  - Usuario Docker Hub
# DOCKERHUB_TOKEN     - Token Docker Hub
# ═══════════════════════════════════════════════════════════════════════════
