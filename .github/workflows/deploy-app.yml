name: "Deploy — App"

# ---------------------------------------------------------------------------
# Disparo manual com tag obrigatoria.
# Para ativar disparo automatico ao criar uma tag, descomente o bloco abaixo:
#
# on:
#   push:
#     tags:
#       - 'v*.*.*'
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag existente no repositorio (ex: v1.2.0)"
        required: true
        type: string

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # JOB 1 - Validar tag
  # ════════════════════════════════════════════════════════════════════════
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar se a tag existe
        run: |
          if ! git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag '${{ inputs.tag }}' nao existe no repositorio."
            exit 1
          fi
          echo "Tag '${{ inputs.tag }}' encontrada."

  # ════════════════════════════════════════════════════════════════════════
  # JOB 2 - Build e Push da imagem runtime para o GHCR
  # ════════════════════════════════════════════════════════════════════════
  build-push:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Determinar versao
        id: version
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION_CLEAN="${VERSION#v}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION_CLEAN}"        >> "$GITHUB_OUTPUT"
          echo "image_base=ghcr.io/${OWNER}"    >> "$GITHUB_OUTPUT"

      - name: Checkout na tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push — Runtime
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ steps.version.outputs.image_base }}/pelada-app:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image_base }}/pelada-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo
        run: |
          BASE="${{ steps.version.outputs.image_base }}"
          VER="${{ steps.version.outputs.version }}"
          echo "======================================================"
          echo "  ${BASE}/pelada-app:${VER}"
          echo "  ${BASE}/pelada-app:latest"
          echo "======================================================"

  # ════════════════════════════════════════════════════════════════════════
  # JOB 3 - Acionar redeploy no Portainer
  # ════════════════════════════════════════════════════════════════════════
#  deploy:
#    runs-on: ubuntu-latest
#    needs: build-push
#    steps:
#      - name: Notificar Portainer
#        env:
#          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_APP }}
#        if: env.WEBHOOK_URL != ''
#        run: |
#          echo "Acionando redeploy do stack society-app..."
#          curl --fail -X POST "$WEBHOOK_URL"
#          echo "Portainer notificado."

# ═══════════════════════════════════════════════════════════════════════════
# SECRETS NECESSARIAS
# ═══════════════════════════════════════════════════════════════════════════
# GITHUB_TOKEN          - automatico
# PORTAINER_WEBHOOK_APP - webhook do stack society-app gerado pelo Portainer
# ═══════════════════════════════════════════════════════════════════════════
