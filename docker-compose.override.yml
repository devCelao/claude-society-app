# docker-compose.override.yml
# Overrides para desenvolvimento local — carregado automaticamente pelo Docker Compose.
# Uso: docker compose up -d (nao precisa de -f)
#
# Em producao: nao incluir este arquivo — usar apenas docker-compose.yml

name: claude-society-app

services:

  # ---------------------------------------------------------------------------
  # Traefik — HTTP-only em dev, dashboard habilitado
  # ---------------------------------------------------------------------------
  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "8080:8080"    # Traefik dashboard: http://localhost:8080

  # ---------------------------------------------------------------------------
  # App — labels trocam websecure -> web; porta direta exposta
  # CRITICO: sem este override o app fica inacessivel via Traefik em dev
  # (entrypoint websecure nao existe sem TLS configurado)
  # ---------------------------------------------------------------------------
#  app:
#    labels:
#      - "traefik.enable=true"
#      - "traefik.http.routers.app.rule=Host(`localhost`)"
#      - "traefik.http.routers.app.entrypoints=web"
#      - "traefik.http.services.app.loadbalancer.server.port=3000"
#    ports:
#      - "3000:3000"    # acesso direto sem Traefik: http://localhost:3000

  # ---------------------------------------------------------------------------
  # DB — porta exposta para ferramentas locais (TablePlus, DBeaver, etc.)
  # ---------------------------------------------------------------------------
  db:
    ports:
      - "3306:3306"
