name: pelada-app

services:
  # ---------------------------------------------------------------------------
  # DB — MySQL 8.0
  # ---------------------------------------------------------------------------
  pelada-database:
    image: mysql:8.0
    container_name: pelada-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - pelada_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pelada_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

# -------------------------------------------------------------------------
# Networks
# -------------------------------------------------------------------------
networks:
  pelada_net:
    name: pelada_net
    driver: bridge

# -------------------------------------------------------------------------
# Volumes
# -------------------------------------------------------------------------
volumes:
  pelada_db_data:
